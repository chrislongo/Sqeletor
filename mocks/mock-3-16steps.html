<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sqeletor — Mock 3 (16 steps)</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #000;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: system-ui, sans-serif;
    gap: 32px;
  }

  h2 {
    color: rgba(255,255,255,0.3);
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    font-weight: 500;
  }

  .panel {
    display: inline-flex;
    background: #000;
    padding: 14px;
    gap: 10px;
  }

  /* ── LEFT CONTROL COLUMN ── */
  .controls {
    width: 68px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .ctrl-tile {
    flex: 1;
    background: #fff;
    border-radius: 4px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    gap: 2px;
  }

  .ctrl-label {
    font-size: 7px;
    letter-spacing: 0.15em;
    color: #000;
    text-transform: uppercase;
    font-weight: 700;
  }

  .ctrl-value {
    font-size: 18px;
    font-weight: 900;
    color: #000;
    line-height: 1;
  }

  .ctrl-rate  .ctrl-value { font-size: 13px; }
  .ctrl-mode  .ctrl-value { font-size: 22px; }
  .ctrl-rest  .ctrl-value { font-size: 22px; }

  /* ── NOTE TILE GRID ── */
  .grid-8  { grid-template-columns: repeat(4, 120px); grid-template-rows: repeat(2, 160px); }
  .grid-16 { grid-template-columns: repeat(4, 120px); grid-template-rows: repeat(4, 100px); }

  .grid {
    display: grid;
    gap: 8px;
  }

  .note-tile {
    background: #fff;
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    position: relative;
  }

  .note-name {
    font-size: 68px;
    font-weight: 900;
    line-height: 0.9;
    color: #000;
    text-align: center;
  }

  .note-name.two-char { font-size: 48px; }

  .note-rest .rest-symbol {
    font-size: 56px;
    font-weight: 900;
    line-height: 1;
    color: rgba(0,0,0,0.2);
  }

  .note-tile.active {
    background: #000;
    outline: 3px solid #fff;
  }
  .note-tile.active .note-name { color: #fff; }

  .note-tile.empty {
    background: transparent;
    outline: 2px solid rgba(255,255,255,0.12);
  }
</style>
</head>
<body>

<!-- ── 8-STEP (current) ── -->
<h2>8 steps — current</h2>
<div class="panel">
  <div class="controls">
    <div class="ctrl-tile ctrl-rate"><span class="ctrl-label">RATE</span><span class="ctrl-value">1/8</span></div>
    <div class="ctrl-tile ctrl-mode"><span class="ctrl-label">MODE</span><span class="ctrl-value">→</span></div>
    <div class="ctrl-tile ctrl-rec"><span class="ctrl-label">REC</span><span class="ctrl-value">⏺</span></div>
    <div class="ctrl-tile ctrl-rest"><span class="ctrl-label">REST</span><span class="ctrl-value">—</span></div>
    <div class="ctrl-tile ctrl-lock">
      <span class="ctrl-label">LOCK</span>
      <svg width="22" height="24" viewBox="0 0 22 24" fill="none">
        <path d="M6 10V7a5 5 0 0 1 10 0v3" stroke="#000" stroke-width="2.5" stroke-linecap="round"/>
        <rect x="2" y="10" width="18" height="13" rx="2" fill="#000"/>
        <circle cx="11" cy="17" r="2" fill="#fff"/>
      </svg>
    </div>
  </div>
  <div class="grid grid-8" style="font-size:88px">
    <div class="note-tile"><span class="note-name">C</span></div>
    <div class="note-tile"><span class="note-name">E</span></div>
    <div class="note-tile active"><span class="note-name">G</span></div>
    <div class="note-tile"><span class="note-name">B</span></div>
    <div class="note-tile"><span class="note-name">D</span></div>
    <div class="note-tile"><span class="note-name two-char">F#</span></div>
    <div class="note-tile"><span class="note-name">A</span></div>
    <div class="note-tile note-rest"><span class="rest-symbol">–</span></div>
  </div>
</div>

<!-- ── 16-STEP ── -->
<h2>16 steps</h2>
<div class="panel">
  <div class="controls">
    <div class="ctrl-tile ctrl-rate"><span class="ctrl-label">RATE</span><span class="ctrl-value">1/8</span></div>
    <div class="ctrl-tile ctrl-mode"><span class="ctrl-label">MODE</span><span class="ctrl-value">→</span></div>
    <div class="ctrl-tile ctrl-rec"><span class="ctrl-label">REC</span><span class="ctrl-value">⏺</span></div>
    <div class="ctrl-tile ctrl-rest"><span class="ctrl-label">REST</span><span class="ctrl-value">—</span></div>
    <div class="ctrl-tile ctrl-lock">
      <span class="ctrl-label">LOCK</span>
      <svg width="22" height="24" viewBox="0 0 22 24" fill="none">
        <path d="M6 10V7a5 5 0 0 1 10 0v3" stroke="#000" stroke-width="2.5" stroke-linecap="round"/>
        <rect x="2" y="10" width="18" height="13" rx="2" fill="#000"/>
        <circle cx="11" cy="17" r="2" fill="#fff"/>
      </svg>
    </div>
  </div>
  <div class="grid grid-16">
    <div class="note-tile"><span class="note-name">C</span></div>
    <div class="note-tile"><span class="note-name">D</span></div>
    <div class="note-tile"><span class="note-name">E</span></div>
    <div class="note-tile"><span class="note-name two-char">F#</span></div>
    <div class="note-tile"><span class="note-name">G</span></div>
    <div class="note-tile"><span class="note-name">A</span></div>
    <div class="note-tile"><span class="note-name">B</span></div>
    <div class="note-tile note-rest"><span class="rest-symbol">–</span></div>
    <div class="note-tile"><span class="note-name">C</span></div>
    <div class="note-tile"><span class="note-name">E</span></div>
    <div class="note-tile active"><span class="note-name">G</span></div>
    <div class="note-tile"><span class="note-name">B</span></div>
    <div class="note-tile"><span class="note-name">D</span></div>
    <div class="note-tile note-rest"><span class="rest-symbol">–</span></div>
    <div class="note-tile empty"></div>
    <div class="note-tile empty"></div>
  </div>
</div>

</body>
</html>
