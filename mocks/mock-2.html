<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>FreakQuencer — Mock 2</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #000;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: system-ui, sans-serif;
  }

  .panel {
    display: inline-flex;
    background: #000;
    padding: 14px;
    gap: 10px;
  }

  /* ── LEFT CONTROL COLUMN ── */
  .controls {
    width: 68px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .ctrl-tile {
    flex: 1;
    background: #fff;
    border-radius: 4px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    gap: 2px;
  }

  .ctrl-label {
    font-size: 7px;
    letter-spacing: 0.15em;
    color: #000;
    text-transform: uppercase;
    font-weight: 700;
  }

  .ctrl-value {
    font-size: 18px;
    font-weight: 900;
    color: #000;
    line-height: 1;
  }

  .ctrl-rate .ctrl-value { font-size: 13px; }
  .ctrl-mode .ctrl-value { font-size: 22px; }
  .ctrl-rest .ctrl-value { font-size: 22px; }

  /* ── NOTE TILE GRID ── */
  .grid {
    display: grid;
    grid-template-columns: repeat(4, 120px);
    grid-template-rows: repeat(2, 120px);
    gap: 8px;
  }

  .note-tile {
    background: #fff;
    border-radius: 4px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    position: relative;
  }

  .note-name {
    font-size: 88px;
    font-weight: 900;
    line-height: 0.9;
    color: #000;
    text-align: center;
  }

  .note-name.two-char { font-size: 62px; }

  .note-octave {
    display: none;
  }

  .note-rest {
    background: #fff;
  }
  .note-rest .rest-symbol {
    font-size: 72px;
    font-weight: 900;
    line-height: 1;
    color: rgba(0,0,0,0.2);
  }

  /* active tile: inverted */
  .note-tile.active {
    background: #000;
    outline: 3px solid #fff;
  }
  .note-tile.active .note-name { color: #fff; }
  .note-tile.active .note-octave { color: rgba(255,255,255,0.4); }
</style>
</head>
<body>

<div class="panel">

  <!-- LEFT CONTROL COLUMN -->
  <div class="controls">

    <div class="ctrl-tile ctrl-rate">
      <span class="ctrl-label">RATE</span>
      <span class="ctrl-value">1/8</span>
    </div>

    <div class="ctrl-tile ctrl-mode">
      <span class="ctrl-label">MODE</span>
      <span class="ctrl-value">→</span>
    </div>

    <div class="ctrl-tile ctrl-rec">
      <span class="ctrl-label">REC</span>
      <span class="ctrl-value">⏺</span>
    </div>

    <div class="ctrl-tile ctrl-rest">
      <span class="ctrl-label">REST</span>
      <span class="ctrl-value">—</span>
    </div>

    <div class="ctrl-tile ctrl-lock">
      <span class="ctrl-label">LOCK</span>
      <svg width="22" height="24" viewBox="0 0 22 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M6 10V7a5 5 0 0 1 10 0v3" stroke="#000" stroke-width="2.5" stroke-linecap="round"/>
        <rect x="2" y="10" width="18" height="13" rx="2" fill="#000"/>
        <circle cx="11" cy="17" r="2" fill="#fff"/>
      </svg>
    </div>

  </div>

  <!-- NOTE TILE GRID -->
  <div class="grid">

    <div class="note-tile note-C">
      <span class="note-name">C</span>
      <span class="note-octave">4</span>
    </div>

    <div class="note-tile note-E">
      <span class="note-name">E</span>
      <span class="note-octave">4</span>
    </div>

    <div class="note-tile note-G active">
      <span class="note-name">G</span>
      <span class="note-octave">4</span>
    </div>

    <div class="note-tile note-B">
      <span class="note-name">B</span>
      <span class="note-octave">4</span>
    </div>

    <div class="note-tile note-D">
      <span class="note-name">D</span>
      <span class="note-octave">4</span>
    </div>

    <div class="note-tile note-Fs">
      <span class="note-name two-char">F#</span>
      <span class="note-octave">4</span>
    </div>

    <div class="note-tile note-A">
      <span class="note-name">A</span>
      <span class="note-octave">4</span>
    </div>

    <div class="note-tile note-rest">
      <span class="rest-symbol">–</span>
      <span class="note-octave">rest</span>
    </div>

  </div>

</div>

<script>
  const modes = [
    { symbol: '→', label: 'FWD' },
    { symbol: '←', label: 'REV' },
    { symbol: '⇄',  label: 'RND' },
  ];
  let modeIndex = 0;

  const modeTile = document.querySelector('.ctrl-mode');
  const modeValue = modeTile.querySelector('.ctrl-value');
  const modeLabel = modeTile.querySelector('.ctrl-label');

  modeTile.addEventListener('click', () => {
    modeIndex = (modeIndex + 1) % modes.length;
    modeValue.textContent = modes[modeIndex].symbol;
    modeLabel.textContent = modes[modeIndex].label;
  });
</script>
</body>
</html>
